name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * *'

jobs:
  api-coverage:
    name: API coverage — Petstore
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated coverage badge / report

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests + coverage
        # global-setup.ts starts the Petstore container and waits for it to be
        # ready before the first worker starts. playswag reporter writes coverage
        # to playswag-report/ and posts a step summary automatically.
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playswag-report
          path: playswag-report/
          retention-days: 30

      - name: Commit updated badge
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playswag-report/playswag-badge.svg playswag-report/playswag-coverage.md || true
          git diff --cached --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push
